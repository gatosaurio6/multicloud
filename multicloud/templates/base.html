<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal de Pacientes{% endblock %}</title>

    <style>
        :root {
            --primary: #2a9d8f;
            --background: #f4f7f9;
            --text: #333;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
        }

        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 1rem 2rem;
        }

        header h1 {
            font-size: 1.2rem;
        }

        main {
            padding: 2rem;
            min-height: 80vh;
        }

        footer {
            background-color: var(--primary);
            color: var(--white);
            text-align: center;
            padding: 1rem;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    <h1>Portal de Pacientes</h1>
</header>

<main>
    {% block content %}

    {% endblock %}
</main>


{% block extra_js %}{% endblock %}

</body>
</html>
