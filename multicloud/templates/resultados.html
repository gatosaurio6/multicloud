{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Resultados</title>

        <style>
            body {
                font-family: 'Arial', cursive;
                background-color: #f4f6f8;
                margin: 0;
                padding: 20px;
            }

            h2 {margin-top: 30px}

            .contenedor {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
            }

            .card {
                width: 200px;
                padding: 15px;
                border-radius: 10px;
                text-decoration: none;
                color: black;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2);
                transition: transform 0.2s;
            }

            .card:hover {
                transform: scale(1.05);
            }

            .imagen {
                background-color: #0068b3
            }

            .informe {
                background-color: #9e1607;
            }

            .titulo {
                font-weight: bold;
                margin-bottom: 5px;
            }

            .medico {
                font-size: 0.9em;
                color: #555
            }
        </style>
    </head>
    <body>
        <h1>Resultados</h1>
        <h2>Imagenes</h2>
        <div id = "imagenes" class = "contenedor"></div>
        <h2>Informes</h2>
        <div id = "informes" class = "contenedor"></div>
    </body>
    <script>
        const paciente_id = localStorage.getItem("paciente_id");
        fetch(`http://127.0.0.1:8000/hospital/api/resultados/?paciente_id=${paciente_id}`)
        .then(res => res.json())
        .then(data => {
            const contImagenes = document.getElementById("imagenes");
            const contInformes = document.getElementById("informes");

            data.forEach(r => {
                const card = document.createElement("a");
                card.className = "card";
                card.href = `/hospital/detalle/${r.id}/`;
                card.innerHTML = `
                <div class = "titulo">${r.examen}</div>
                <div class = "medico">Dr.${r.medico}</div>
                `;

                if (r.imagen) {
                    card.classList.add("imagen");
                    contImagenes.appendChild(card);
                }

                if (r.informe) {
                    card.classList.add("informe");
                    contInformes.appendChild(card);
                }
            });
        });
    </script>
</html>
