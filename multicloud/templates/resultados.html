{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Resultados</title>

        <style>
            body {
                font-family: 'Comic Sans MS', cursive;
                background-color: #f4f6f8;
                margin: 0;
                padding: 20px;
            }

            h2 {margin-top: 30px}

            .contenedor {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
            }

            .card {
                width: 200px;
                padding: 15px;
                border-radius: 10px;
                text-decoration: none;
                color: black;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2);
                transition: transform 0.2s;
            }

            .card:hover {
                transform: scale(1.05);
            }

            .imagen {
                background-color: #0068b3
            }

            .informe {
                background-color: #9e1607;
            }

            .titulo {
                font-weight: bold;
                margin-bottom: 5px;
            }

            .medico {
                font-size: 0.9em;
                color: #555
            }
        </style>
    </head>
    <body>
        <h1>Resultados</h1>

        <h2>Imágenes</h2>
        <div class="contenedor">
            {% for r in imagen %}
                <a href="{% url 'detalle' r.id%}" class="card imagen">
                    <div class="titulo">{{ r.examen }}</div>
                    <div class="medico"> Dr. {{ r.medico.nombre }}</div>
                </a>
            {% empty %}
                <p>no hay imagenes disponibles</p>
            {% endfor}
        </div>

        <h2>Informe</h2>
        <div class="contenedor">
            {% for r in informe %}
                <a href="{% url 'detalle' r.id %}" class="card informe">
                    <div class="titulo">{{r.examen}}</div>
                    <div class="medico">Dr.{{r.medico.nombre}}</div>
                </a>
            {% empty %}
                <p>No hay informes disponibles</p>
            {% endfor %}
        </div>
    </body>
</html>
